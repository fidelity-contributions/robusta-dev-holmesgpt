# Test: the agent is handed a CONFIDENTLY-WRONG pre-loaded skill that
# claims the ES index stores log severity in field `lvl` with values
# `ERR`/`WRN`/`INF`. The reality is that this index — modeled on 261 —
# uses `severity` with values `ERROR`/`WARN`/`INFO`.
#
# What we're checking:
#   1. The agent does NOT blindly trust the captured skill — when the
#      `lvl: "ERR"` query returns zero, it falls back to inspecting the
#      mapping and re-querying with the real field.
#   2. The final answer is still correct (10 ERROR entries).
#   3. The agent proposes a CORRECTION to the bad skill: a SuggestSkills
#      call whose suggestion sets `updates_skill` to the loaded skill's
#      name (`app-279-error-log-querying`), so the user is offered an
#      update to the saved skill instead of a duplicate. Enforced
#      deterministically via `expected_skill_updates` below; the
#      corrected content is judged via expected_output (the judge sees
#      the emitted suggestions).
#
# This is the regression test for "what if a customer accumulates a
# misleading skill". The bad SKILL.md ships with the fixture in
# ./bad_skill and is loaded into the SkillsToolset via
# `pre_loaded_skills_path`.

user_prompt: "In the elasticsearch index 'app-279-logs-j2h9d4w7', how many ERROR-level log entries are there for the checkout-279 service?"

expected_output:
  - "There are 10 ERROR-level entries in app-279-logs-j2h9d4w7 (the pre-loaded skill named the wrong field; the real field is `severity`)"
  - "Must emit a SuggestSkills suggestion correcting the bad skill: its instructions must say the severity field is `severity` with full-word values like `ERROR` (not `lvl` with `ERR`)"

# Pre-load a deliberately-misleading skill before the primary pass. The
# agent will see this skill in the SkillsToolset listing and likely
# fetch it; the test checks that the agent still arrives at the correct
# answer despite the bad guidance.

pre_loaded_skills_path: ./bad_skill

# The corrective suggestion must reference the loaded bad skill by name
# through `updates_skill` — proposing a parallel duplicate fails.
memories_generated: true
expected_skill_updates:
  - app-279-error-log-querying

tags:
  - elasticsearch
  - question-answer
  - medium
  - skills

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  export HOLMES_ES_TEST_INDEX="app-279-logs-j2h9d4w7"
  echo "Using test index: $HOLMES_ES_TEST_INDEX"

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  echo "⏳ Creating test index with `severity` field (NOT `lvl` as the bad skill claims)..."

  CREATE_RESPONSE=$(curl -sf -X PUT "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": { "number_of_shards": 1, "number_of_replicas": 0 },
      "mappings": {
        "properties": {
          "severity": { "type": "keyword" },
          "message":  { "type": "text" },
          "service":  { "type": "keyword" },
          "@timestamp": { "type": "date" }
        }
      }
    }')

  if ! echo "$CREATE_RESPONSE" | grep -q '"acknowledged":true'; then
    echo "❌ Failed to create index: $CREATE_RESPONSE"
    exit 1
  fi
  sleep 2

  # 10 ERROR, 5 WARN, 15 INFO — all using `severity` with full-word values.
  # The pre-loaded skill claims field=`lvl`, values=`ERR`/`WRN`/`INF`, so
  # the agent's first attempt (if it follows the skill) will miss.
  BULK_DATA=""
  for i in $(seq 1 10); do
    TS=$(printf '2026-05-14T12:00:%02dZ' "$i")
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"severity\":\"ERROR\",\"service\":\"checkout-279\",\"message\":\"DB connection refused $i\",\"@timestamp\":\"${TS}\"}\n"
  done
  for i in $(seq 1 5); do
    TS=$(printf '2026-05-14T12:01:%02dZ' "$i")
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"severity\":\"WARN\",\"service\":\"checkout-279\",\"message\":\"Slow query $i\",\"@timestamp\":\"${TS}\"}\n"
  done
  for i in $(seq 1 15); do
    TS=$(printf '2026-05-14T12:02:%02dZ' "$i")
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"severity\":\"INFO\",\"service\":\"checkout-279\",\"message\":\"Health check $i\",\"@timestamp\":\"${TS}\"}\n"
  done

  BULK_RESPONSE=$(echo -e "$BULK_DATA" | curl -sf -X POST "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @-)

  if echo "$BULK_RESPONSE" | grep -q '"errors":true'; then
    echo "❌ Bulk insert had errors: $BULK_RESPONSE"
    exit 1
  fi

  curl -sf -X POST "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  DOC_COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_count" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)

  if [ "$DOC_COUNT" = "30" ]; then
    echo "✅ Index created with $DOC_COUNT docs (10 ERROR / 5 WARN / 15 INFO) using `severity` field"
  else
    echo "❌ Expected 30 documents, found: $DOC_COUNT"
    exit 1
  fi

after_test: |
  echo "⏳ Cleaning up test index: app-279-logs-j2h9d4w7"
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-279-logs-j2h9d4w7" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  echo "✅ Cleanup complete"
